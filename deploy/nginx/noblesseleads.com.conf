# /etc/nginx/sites-available/noblesseleads.com

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name noblesseleads.com www.noblesseleads.com;

    return 301 https://noblesseleads.com$request_uri;
}

# HTTPS reverse proxy to Next.js on port 3001
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name noblesseleads.com;

    # Let's Encrypt certificates
    ssl_certificate /etc/letsencrypt/live/noblesseleads.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/noblesseleads.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/noblesseleads.com/chain.pem;

    # Recommended SSL settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Allow larger payloads if needed (file uploads/forms)
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / SSE support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
    }
}

# Optional: redirect https://www -> https://noblesseleads.com
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.noblesseleads.com;

    ssl_certificate /etc/letsencrypt/live/noblesseleads.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/noblesseleads.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/noblesseleads.com/chain.pem;

    return 301 https://noblesseleads.com$request_uri;
}